<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 노후 계산기</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <h1>나의 노후 계산기</h1>
      <p class="subtitle">현재 자산과 매월 저축액을 넣으면, 은퇴 시점에 모을 수 있는 돈을 계산해 드립니다.</p>
    </header>

    <section class="inputs">
      <div class="field">
        <div class="field-label">
          <label for="current">현재 보유 자산</label>
          <span class="field-value" id="out-current">10,000,000원</span>
        </div>
        <input type="range" id="current" min="0" max="200000000" step="1000000" value="10000000" />
      </div>

      <div class="field">
        <div class="field-label">
          <label for="monthly">월 저축액</label>
          <span class="field-value" id="out-monthly">500,000원</span>
        </div>
        <input type="range" id="monthly" min="0" max="3000000" step="50000" value="500000" />
      </div>

      <div class="field">
        <div class="field-label">
          <label for="rate">연 수익률</label>
          <span class="field-value" id="out-rate">6%</span>
        </div>
        <input type="range" id="rate" min="0" max="12" step="0.5" value="6" />
      </div>

      <div class="field">
        <div class="field-label">
          <label for="years">저축 기간</label>
          <span class="field-value" id="out-years">30년</span>
        </div>
        <input type="range" id="years" min="1" max="50" step="1" value="30" />
      </div>

      <div class="field">
        <div class="field-label">
          <label for="inflation">물가상승률</label>
          <span class="field-value" id="out-inflation">2.5%</span>
        </div>
        <input type="range" id="inflation" min="0" max="6" step="0.5" value="2.5" />
      </div>
    </section>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">은퇴 시 예상 자산</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">오늘날 가치로 환산</div>
        <div class="stat-value accent" id="stat-real">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">내가 넣은 원금</div>
        <div class="stat-value" id="stat-principal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">불어난 수익</div>
        <div class="stat-value accent" id="stat-interest">—</div>
      </div>
    </section>

    <p class="note" id="note"></p>

    <section class="chart-wrap">
      <canvas id="chart"></canvas>
    </section>

    <div class="legend">
      <span><span class="line solid"></span>총 자산</span>
      <span><span class="line dashed"></span>내가 넣은 원금</span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
